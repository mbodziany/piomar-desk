name: Build Custom RustDesk Windows

on:
  workflow_dispatch:

env:
  DEFAULT_RENDEZVOUS_SERVER: ${{ secrets.DEFAULT_RENDEZVOUS_SERVER }}
  DEFAULT_RS_PUB_KEY: ${{ secrets.DEFAULT_RS_PUB_KEY }}

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Flutter Windows desktop
        run: |
          flutter config --enable-windows-desktop
          flutter doctor -v

      - name: Install LLVM
        run: echo "LLVM already installed"

      - name: Patch rendezvous server
        shell: pwsh
        run: |
          $configPath = "libs/hbb_common/src/config.rs"
          (Get-Content $configPath) `
            -replace 'rs-ny.rustdesk.com', '${{ secrets.DEFAULT_RENDEZVOUS_SERVER }}' `
            -replace 'rs-sg.rustdesk.com', '${{ secrets.DEFAULT_RENDEZVOUS_SERVER }}' `
            -replace 'rs-cn.rustdesk.com', '${{ secrets.DEFAULT_RENDEZVOUS_SERVER }}' | `
          Set-Content $configPath

      - name: Patch public key
        shell: pwsh
        run: |
          $configPath = "libs/hbb_common/src/config.rs"
          $content = Get-Content $configPath -Raw
          $newLine = 'pub const RS_PUB_KEY: &' + "'" + 'static str = "${{ secrets.DEFAULT_RS_PUB_KEY }}";'
          $content = $content -replace 'pub const RS_PUB_KEY.*', $newLine
          Set-Content $configPath $content
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install opus:x64-windows-static
          echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
      - name: Build
        run: |
          flutter pub get
          cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-piomar-windows
          path: target/release/rustdesk.exe
